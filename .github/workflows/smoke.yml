name: Smoke test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Carp
        id: setup
        uses: ./

      - name: Print resolved Carp version
        shell: bash
        run: |
          echo "CARP_DIR=$CARP_DIR"
          echo "carp-sha=${{ steps.setup.outputs.carp-sha }}"
          carp --version

      - name: Run smoke test
        shell: bash
        run: carp -x test/smoke.carp
